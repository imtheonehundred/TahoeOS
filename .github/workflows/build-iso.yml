name: Build TahoeOS ISO

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'packages/**'
      - '.github/workflows/build-iso.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:42
      options: --privileged
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            lorax \
            livecd-tools \
            pykickstart \
            anaconda \
            squashfs-tools \
            xorriso \
            grub2-pc \
            grub2-pc-modules \
            dracut-live \
            git \
            wget \
            curl

      - name: Setup loop devices
        run: |
          modprobe loop || true
          for i in $(seq 0 7); do
            [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i
          done

      - name: Download and prepare themes
        run: |
          mkdir -p build/themes-bundle
          cd build/themes-bundle
          
          # GTK Theme - MacTahoe (macOS Sequoia/Tahoe style)
          git clone --depth=1 https://github.com/vinceliuice/MacTahoe-gtk-theme.git
          
          # Icon Theme - MacTahoe
          git clone --depth=1 https://github.com/vinceliuice/MacTahoe-icon-theme.git
          
          # Cursor Theme
          git clone --depth=1 https://github.com/vinceliuice/WhiteSur-cursors.git
          
          # GRUB Theme
          git clone --depth=1 https://github.com/vinceliuice/grub2-themes.git
          
          # Plymouth Theme
          git clone --depth=1 https://github.com/adi1090x/plymouth-themes.git
          
          cd ../..
          echo "Themes downloaded to build/themes-bundle/"
          ls -la build/themes-bundle/

      - name: Build ISO
        id: build
        run: |
          # Use unique directories to avoid conflicts
          BUILD_ID=$(date +%s)
          RESULTS_DIR="/tmp/iso-output-${BUILD_ID}"
          TMP_DIR="/var/tmp/tahoeos-${BUILD_ID}"
          
          echo "BUILD_ID=${BUILD_ID}" >> $GITHUB_ENV
          echo "RESULTS_DIR=${RESULTS_DIR}" >> $GITHUB_ENV
          echo "TMP_DIR=${TMP_DIR}" >> $GITHUB_ENV
          
          mkdir -p "$TMP_DIR"
          
          # Run lorax - it will fail at xorriso step but we get LiveOS files
          livemedia-creator \
            --make-iso \
            --nomacboot \
            --ks=build/kickstart/tahoeos.ks \
            --no-virt \
            --resultdir="$RESULTS_DIR" \
            --project=TahoeOS \
            --releasever=42 \
            --iso-only \
            --iso-name=TahoeOS-2026.1-x86_64.iso \
            --tmp="$TMP_DIR" || true
          
          echo "=== Lorax finished, creating ISO manually ==="
          
          # Find the work directory with LiveOS
          WORK_DIR=$(find /var/tmp -maxdepth 3 -type d -name "lmc-work-*" 2>/dev/null | head -1)
          echo "Work directory: $WORK_DIR"
          
          if [ -z "$WORK_DIR" ]; then
            echo "ERROR: Could not find work directory"
            exit 1
          fi
          
          ls -la "$WORK_DIR"
          ls -la "$WORK_DIR/LiveOS" 2>/dev/null || echo "No LiveOS"
          ls -la "$WORK_DIR/images" 2>/dev/null || echo "No images"
          
          # Create BIOS-only ISO with mkisofs
          mkisofs \
            -o "${RESULTS_DIR}/TahoeOS-2026.1-x86_64.iso" \
            -b images/eltorito.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -V TahoeOS \
            -R -J \
            -pad \
            "$WORK_DIR/"
          
          echo "=== ISO created ==="
          ls -la "${RESULTS_DIR}/"*.iso

      - name: Copy ISO to workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/iso-output
          ISO_DIR="${{ env.RESULTS_DIR }}"
          
          if [ -d "$ISO_DIR" ] && [ -f "$ISO_DIR/TahoeOS-2026.1-x86_64.iso" ]; then
            cp "$ISO_DIR/TahoeOS-2026.1-x86_64.iso" $GITHUB_WORKSPACE/iso-output/
            ls -la $GITHUB_WORKSPACE/iso-output/
          else
            echo "No ISO found in $ISO_DIR"
            find /tmp -name "TahoeOS-*.iso" 2>/dev/null | head -5
          fi
      
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: TahoeOS-2026.1-x86_64
          path: iso-output/*.iso
          retention-days: 14
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: TahoeOS-2026.1-x86_64
          path: ./iso

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2026.1-${{ github.run_number }}
          name: TahoeOS 2026.1 Build ${{ github.run_number }}
          files: ./iso/*.iso
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
