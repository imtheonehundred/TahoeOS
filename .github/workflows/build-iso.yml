name: Build TahoeOS ISO

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'packages/**'
      - '.github/workflows/build-iso.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:42
      options: --privileged
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            lorax \
            livecd-tools \
            pykickstart \
            anaconda \
            squashfs-tools \
            xorriso \
            grub2-efi-x64 \
            shim-x64 \
            dracut-live \
            git \
            wget \
            curl

      - name: Setup loop devices
        run: |
          modprobe loop || true
          for i in $(seq 0 7); do
            [ -e /dev/loop$i ] || mknod /dev/loop$i b 7 $i
          done

      - name: Download and prepare themes
        run: |
          mkdir -p build/themes-bundle
          cd build/themes-bundle
          
          # GTK Theme - MacTahoe (macOS Sequoia/Tahoe style)
          git clone --depth=1 https://github.com/vinceliuice/MacTahoe-gtk-theme.git
          
          # Icon Theme - MacTahoe
          git clone --depth=1 https://github.com/vinceliuice/MacTahoe-icon-theme.git
          
          # Cursor Theme
          git clone --depth=1 https://github.com/vinceliuice/WhiteSur-cursors.git
          
          # GRUB Theme
          git clone --depth=1 https://github.com/vinceliuice/grub2-themes.git
          
          # Plymouth Theme
          git clone --depth=1 https://github.com/adi1090x/plymouth-themes.git
          
          cd ../..
          echo "Themes downloaded to build/themes-bundle/"
          ls -la build/themes-bundle/

      - name: Build disk image
        id: build
        run: |
          # Use unique directories to avoid conflicts
          BUILD_ID=$(date +%s)
          RESULTS_DIR="/tmp/iso-output-${BUILD_ID}"
          TMP_DIR="/var/tmp/tahoeos-${BUILD_ID}"
          
          echo "BUILD_ID=${BUILD_ID}" >> $GITHUB_ENV
          echo "RESULTS_DIR=${RESULTS_DIR}" >> $GITHUB_ENV
          echo "TMP_DIR=${TMP_DIR}" >> $GITHUB_ENV
          
          mkdir -p "$RESULTS_DIR" "$TMP_DIR"
          
          # Build only disk image, not ISO
          livemedia-creator \
            --make-disk \
            --image-only \
            --ks=build/kickstart/tahoeos.ks \
            --no-virt \
            --resultdir="$RESULTS_DIR" \
            --project=TahoeOS \
            --releasever=42 \
            --tmp="$TMP_DIR"
        timeout-minutes: 120

      - name: Create BIOS-only ISO
        run: |
          set -e
          
          echo "=== Creating BIOS-only ISO ==="
          
          # Find the work directory
          WORK_DIR=$(find /var/tmp/tahoeos-* -maxdepth 2 -type d -name "lmc-work-*" 2>/dev/null | head -1)
          echo "Work directory: $WORK_DIR"
          
          if [ -z "$WORK_DIR" ]; then
            echo "ERROR: Could not find lmc-work directory"
            exit 1
          fi
          
          cd "$WORK_DIR"
          ls -la
          
          # Create LiveOS structure if not exists
          mkdir -p LiveOS
          
          # Find the disk image
          if [ -f *.qcow2 ]; then
            DISK_IMG=$(ls *.qcow2 | head -1)
            echo "Converting qcow2 to raw: $DISK_IMG"
            qemu-img convert -O raw "$DISK_IMG" LiveOS/squashfs.img
          elif [ -f *.img ]; then
            cp *.img LiveOS/squashfs.img
          elif [ -f images/install.img ]; then
            # This is the squashfs for live boot
            cp images/install.img LiveOS/squashfs.img
          fi
          
          # Create EFI/BOOT for potential UEFI (not used in BIOS-only ISO)
          mkdir -p EFI/BOOT
          
          # Copy kernel and initrd
          if [ -f images/pxeboot/initrd.img ]; then
            cp images/pxeboot/initrd.img boot/initrd.img
          fi
          if [ -f images/pxeboot/vmlinuz ]; then
            cp images/pxeboot/vmlinuz boot/vmlinuz
          fi
          
          ls -la LiveOS/
          
          # Create BIOS-only ISO with mkisofs
          echo "Creating BIOS-only ISO..."
          
          # Volume ID must be max 16 chars for Joliet
          mkisofs \
            -o TahoeOS-2026.1-x86_64.iso \
            -b images/eltorito.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -V TahoeOS \
            -R -J \
            -pad \
            -z \
            "$WORK_DIR/"
          
          ls -la *.iso
          
          # Copy to results
          cp *.iso "$RESULTS_DIR/" 2>/dev/null || cp *.iso /tmp/iso-output-${BUILD_ID}/

      - name: Copy ISO to workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/iso-output
          BUILD_ID=$(date +%s)
          ISO_DIR="/tmp/iso-output-${BUILD_ID}"
          
          # Find the most recent ISO
          ISO_FILE=$(find /tmp -name "TahoeOS-*.iso" -type f 2>/dev/null | head -1)
          if [ -n "$ISO_FILE" ]; then
            echo "Found ISO: $ISO_FILE"
            cp "$ISO_FILE" $GITHUB_WORKSPACE/iso-output/
          else
            echo "No ISO found"
            find /tmp -name "*.iso" 2>/dev/null | head -5
          fi
          
          ls -la $GITHUB_WORKSPACE/iso-output/
      
      - name: Copy ISO to workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/iso-output
          cp /tmp/iso-output/*.iso $GITHUB_WORKSPACE/iso-output/ 2>/dev/null || echo "Trying to find ISO..."
          find /tmp/iso-output -name "*.iso" -exec cp {} $GITHUB_WORKSPACE/iso-output/ \; 2>/dev/null || true
          ls -la $GITHUB_WORKSPACE/iso-output/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: TahoeOS-2026.1-x86_64
          path: iso-output/*.iso
          retention-days: 14
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: TahoeOS-2026.1-x86_64
          path: ./iso

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2026.1-${{ github.run_number }}
          name: TahoeOS 2026.1 Build ${{ github.run_number }}
          files: ./iso/*.iso
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
